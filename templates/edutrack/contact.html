{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Contact</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- ── NAVBAR ── -->
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>EduTrack</span>
        </div>
        <div class="navbar-links">
            <a href="/home/" class="nav-link">Home</a>
            <a href="/" class="nav-link">Signup</a>
            <a href="/login/" class="nav-link">Login</a>
            <a href="/about/" class="nav-link">About</a>
            <a href="/contact/" class="nav-link active">Contact</a>
        </div>
        <div class="navbar-right">
            <label class="nav-theme-label" for="nav-theme-toggle">Dark</label>
            <input type="checkbox" id="nav-theme-toggle">
        </div>
    </nav>

    <div class="glass-card contact-card fade-up">
        <i class="fas fa-envelope" style="font-size:2.5rem; color: var(--primary-color); display:block; text-align:center; margin-bottom:0.75rem;"></i>
        <h2>Get in Touch</h2>
        <p class="subtitle">Have a question, suggestion, or just want to say hi? We'd love to hear from you.</p>

        <form id="contact-form" novalidate>
            <div class="input-group full-width">
                <input type="text" id="contact-name" name="contact-name" placeholder=" " required>
                <label for="contact-name">Full Name *</label>
                <span class="error-msg" id="contact-name-error"></span>
            </div>

            <div class="input-group full-width">
                <input type="email" id="contact-email" name="contact-email" placeholder=" " required>
                <label for="contact-email">Email Address *</label>
                <span class="error-msg" id="contact-email-error"></span>
            </div>

            <div class="input-group full-width">
                <textarea id="contact-message" name="contact-message" rows="5" placeholder=" " required
                    style="resize:vertical; width:100%; padding:12px 10px 10px; background:var(--input-bg); border:2px solid transparent; border-bottom:2px solid #ccc; border-radius:8px 8px 0 0; color:var(--text-color); font-size:1rem; outline:none; transition:all 0.3s ease; font-family:inherit;"></textarea>
                <label for="contact-message" style="top:14px;">Message *</label>
                <span class="error-msg" id="contact-message-error"></span>
            </div>

            <button type="submit" id="contact-btn" class="submit-btn">
                <span class="btn-text"><i class="fas fa-paper-plane"></i> Send Message</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div id="contact-success" style="display:none; text-align:center; padding:1.5rem 0;">
            <i class="fas fa-check-circle success-icon"></i>
            <h3 style="margin-top:0.5rem;">Message Sent!</h3>
            <p>Thanks for reaching out. We'll get back to you soon.</p>
        </div>
    </div>

    <script>
        document.getElementById('nav-theme-toggle').addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.querySelector('.fade-up')?.classList.add('visible'), 100);
        });

        const contactForm = document.getElementById('contact-form');
        const contactBtn = document.getElementById('contact-btn');

        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();
            let valid = true;

            const name = document.getElementById('contact-name');
            const email = document.getElementById('contact-email');
            const msg = document.getElementById('contact-message');
            document.getElementById('contact-name-error').textContent = '';
            document.getElementById('contact-email-error').textContent = '';
            document.getElementById('contact-message-error').textContent = '';

            if (!name.value.trim()) {
                document.getElementById('contact-name-error').textContent = 'Name is required.';
                valid = false;
            }
            if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                document.getElementById('contact-email-error').textContent = 'Enter a valid email.';
                valid = false;
            }
            if (!msg.value.trim()) {
                document.getElementById('contact-message-error').textContent = 'Message cannot be empty.';
                valid = false;
            }
            if (!valid) return;

            contactBtn.classList.add('loading');
            contactBtn.disabled = true;

            setTimeout(() => {
                contactBtn.classList.remove('loading');
                contactBtn.disabled = false;
                contactForm.style.display = 'none';
                document.getElementById('contact-success').style.display = 'block';
            }, 1500);
        });
    </script>
</body>
</html>
